<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow DevOps</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

<div class="logo">
🎬 BookMyShow
</div>

<div class="search">

<input
type="text"
id="searchBox"
placeholder="Search Movies, Events, Sports">

</div>

<div class="right">

<select>

<option>Bengaluru</option>
<option>Mysuru</option>
<option>Hyderabad</option>
<option>Chennai</option>

</select>

<button id="loginBtn" onclick="openLogin()">Login</button>
</div>

</nav>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="overlay">

<h1>
Book Tickets for Movies, Events & Sports
</h1>

<p>
India's Biggest Entertainment Platform
</p>

<button onclick="scrollMovies()">
Explore Movies
</button>

</div>

</section>

<!-- ================= MOVIES ================= -->

<section class="movies" id="movies">

<h2>Recommended Movies</h2>

<div class="movie-container" id="movieContainer">

</div>

</section>
<!-- EVENTS -->

<section class="events">

<h2>Live Events</h2>

<div class="event-container">

<div class="event-card">

<h3>🎵 Music Concert</h3>

<p>Bengaluru</p>

<button onclick="bookEvent('Music Concert')">Book Event</button>

</div>

<div class="event-card">

<h3>😂 Stand-up Comedy</h3>

<p>Mysuru</p>

<button onclick="bookEvent('Stand-up Comedy')">Book Event</button>
</div>

<div class="event-card">

<h3>🎭 Drama Show</h3>

<p>Chennai</p>

<button onclick="bookEvent('Drama Show')">Book Event</button>

</div>

</div>

</section>

<!-- LOGIN POPUP -->

<div class="login-popup" id="loginPopup">

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>
<button onclick="closeLogin()">Close</button>

</div>

</div>

<footer>

<p>© 2026 BookMyShow DevOps Project | Developed by Bharath</p>

</footer>

<script src="script.js"></script>

</body>

</html>
